name: relivox
description: "Relivox - Offline P2P Communication System for Zero-Network Environments"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  geolocator: ^13.0.2
  sqflite: ^2.3.2
  path: ^1.9.0
  uuid: ^4.4.0
  nearby_connections: ^4.3.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  logger: ^2.3.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0
  flutter_local_notifications: ^17.0.0
  flutter_foreground_task: ^8.0.0
  record: ^5.1.2
  just_audio: ^0.9.40
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3

dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
